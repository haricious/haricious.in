<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin</title>
  </head>
  <body>
    <script>
      // Load Netlify/Decap CMS and initialize once available.
      window.CMS_MANUAL_INIT = true;
      (function loadCMS(){
        if (window.CMS) {
          CMS.init({ config: '/admin/config.yml' });
          return;
        }
        var s = document.createElement('script');
        // Use a stable CDN URL (avoid semver caret in the URL which may be blocked).
        s.src = 'https://unpkg.com/netlify-cms@latest/dist/netlify-cms.js';
        s.onload = function(){
          if (window.CMS) CMS.init({ config: '/admin/config.yml' });
        };
        s.onerror = function(){
          console.error('Failed to load Netlify CMS script from CDN.');
          var el = document.createElement('div');
          el.style.padding = '24px';
          el.style.fontFamily = 'system-ui,Segoe UI,Roboto,Helvetica,Arial';
          el.innerHTML = '<strong>Admin failed to load.</strong> Check network or CDN availability.';
          document.body.appendChild(el);
        };
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
